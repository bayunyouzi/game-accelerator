# Zeabur 部署配置
services:
  - name: game-accelerator-server
    type: dockerfile
    dockerfilePath: ./Dockerfile
    env:
      - NODE_ENV=production
      - PORT=8080
    ports:
      - port: 8080
        protocol: HTTP
        public: true
    healthCheck:
      http:
        path: /health
        port: 8080
        interval: 30s
        timeout: 10s
        retries: 3

presets:
  - name: nodejs
    version: "20"
